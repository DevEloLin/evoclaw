# EvoClaw — tag-based release.
#
# This workflow only runs when pushing version tags like v0.1.9.
# main branch pushes do not package or publish releases.
#
# Release trigger:
#   git tag -a v0.1.9 -m "Release v0.1.9"
#   git push origin v0.1.9
#
# Optional release notes:
#   .github/release-notes/v0.1.9.md

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            bin_name: evoclaw
            archive_name: evoclaw-aarch64-apple-darwin.tar.gz
            archive_type: tar

          # macOS Intel
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bin_name: evoclaw
            archive_name: evoclaw-x86_64-apple-darwin.tar.gz
            archive_type: tar

          # Linux x64, Ubuntu / Debian / CentOS etc.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_name: evoclaw
            archive_name: evoclaw-x86_64-unknown-linux-gnu.tar.gz
            archive_type: tar

          # Linux ARM64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bin_name: evoclaw
            archive_name: evoclaw-aarch64-unknown-linux-gnu.tar.gz
            archive_type: tar

          # Linux x64 static, better for cross-distro compatibility
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bin_name: evoclaw
            archive_name: evoclaw-x86_64-unknown-linux-musl.tar.gz
            archive_type: tar

          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: evoclaw.exe
            archive_name: evoclaw-x86_64-pc-windows-msvc.zip
            archive_type: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --package evo-cli --bin evoclaw --target ${{ matrix.target }}

      - name: Package Unix
        if: matrix.archive_type == 'tar'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin_name }} dist/evoclaw
          chmod +x dist/evoclaw
          cd dist
          tar -czf ../${{ matrix.archive_name }} evoclaw
          cd ..
          shasum -a 256 ${{ matrix.archive_name }} > ${{ matrix.archive_name }}.sha256

      - name: Package Windows
        if: matrix.archive_type == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "dist/evoclaw.exe"
          Compress-Archive -Path "dist/evoclaw.exe" -DestinationPath "${{ matrix.archive_name }}"
          Get-FileHash "${{ matrix.archive_name }}" -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash.ToLower())  ${{ matrix.archive_name }}" | Out-File -Encoding ascii "${{ matrix.archive_name }}.sha256"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: |
            ${{ matrix.archive_name }}
            ${{ matrix.archive_name }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -name "*.tar.gz" -exec cp {} release/ \;
          find artifacts -type f -name "*.zip" -exec cp {} release/ \;
          find artifacts -type f -name "*.sha256" -exec cp {} release/ \;

      - name: Prepare release notes
        shell: bash
        run: |
          NOTES_FILE=".github/release-notes/${GITHUB_REF_NAME}.md"

          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" release_body.md
          else
            cat > release_body.md <<EOF
          # EvoClaw ${GITHUB_REF_NAME}

          EvoClaw is a local-first, CLI-first, self-evolving personal AI assistant built with Rust.

          This release was created from tag \`${GITHUB_REF_NAME}\`.

          ---

          ## Artifacts

          This release includes binaries for:

          - macOS Apple Silicon
          - macOS Intel
          - Linux x64
          - Linux ARM64
          - Linux x64 static musl
          - Windows x64

          Each artifact includes a matching \`.sha256\` checksum file.

          ---

          ## Install

          Download the artifact for your platform from this release.

          Homebrew support is planned through:

          \`\`\`bash
          brew install develolin/tap/evoclaw
          \`\`\`

          ---

          ## Notes

          Detailed release notes were not provided for this version.
          EOF
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: release_body.md
          generate_release_notes: true
