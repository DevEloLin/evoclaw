name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            bin_name: evoclaw
            archive_name: evoclaw-aarch64-apple-darwin.tar.gz
            archive_type: tar

          # macOS Intel
          - os: macos-13
            target: x86_64-apple-darwin
            bin_name: evoclaw
            archive_name: evoclaw-x86_64-apple-darwin.tar.gz
            archive_type: tar

          # Linux x64, Ubuntu / Debian / CentOS 等
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_name: evoclaw
            archive_name: evoclaw-x86_64-unknown-linux-gnu.tar.gz
            archive_type: tar

          # Linux x64 static, 更适合跨发行版
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bin_name: evoclaw
            archive_name: evoclaw-x86_64-unknown-linux-musl.tar.gz
            archive_type: tar

          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: evoclaw.exe
            archive_name: evoclaw-x86_64-pc-windows-msvc.zip
            archive_type: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --package evo-cli --bin evoclaw --target ${{ matrix.target }}

      - name: Package Unix
        if: matrix.archive_type == 'tar'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin_name }} dist/evoclaw
          cd dist
          tar -czf ../${{ matrix.archive_name }} evoclaw
          cd ..
          shasum -a 256 ${{ matrix.archive_name }} > ${{ matrix.archive_name }}.sha256

      - name: Package Windows
        if: matrix.archive_type == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "dist/evoclaw.exe"
          Compress-Archive -Path "dist/evoclaw.exe" -DestinationPath "${{ matrix.archive_name }}"
          Get-FileHash "${{ matrix.archive_name }}" -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash.ToLower())  ${{ matrix.archive_name }}" | Out-File -Encoding ascii "${{ matrix.archive_name }}.sha256"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: |
            ${{ matrix.archive_name }}
            ${{ matrix.archive_name }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -name "*.tar.gz" -exec cp {} release/ \;
          find artifacts -type f -name "*.zip" -exec cp {} release/ \;
          find artifacts -type f -name "*.sha256" -exec cp {} release/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
