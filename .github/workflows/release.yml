# EvoClaw — tag-based release.
#
# Trigger:
#   git tag -a v1.0.0 -m "Release v1.0.0"
#   git push origin v1.0.0
#
# Produces:
#   macOS  : evoclaw-macos-arm64.dmg
#   Windows: evoclaw-windows-x64-setup.exe
#   Linux  : evoclaw-linux-amd64.deb
#             evoclaw-linux-x86_64.rpm
#             evoclaw-linux-x86_64.tar.gz
#
# Optional release notes:
#   .github/release-notes/<tag>.md   (stable)
#   .github/beta-notes/<tag>.md      (pre-release)

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────
# macOS — Apple Silicon DMG
# ─────────────────────────────────────────────────────────
jobs:
  build-macos:
    name: Build macOS arm64 DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --package evo-cli --bin evoclaw --target aarch64-apple-darwin

      - name: Package DMG
        run: |
          mkdir -p dmg_src
          cp target/aarch64-apple-darwin/release/evoclaw dmg_src/evoclaw
          chmod +x dmg_src/evoclaw
          hdiutil create \
            -volname "EvoClaw" \
            -srcfolder dmg_src \
            -ov \
            -format UDZO \
            evoclaw-macos-arm64.dmg
          shasum -a 256 evoclaw-macos-arm64.dmg \
            | awk '{print $1}' > evoclaw-macos-arm64.dmg.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: evoclaw-macos-arm64.dmg
          path: |
            evoclaw-macos-arm64.dmg
            evoclaw-macos-arm64.dmg.sha256

# ─────────────────────────────────────────────────────────
# Linux — .deb + .rpm + .tar.gz  (x86_64 only)
# ─────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux x86_64 packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install fpm dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm
          sudo gem install --no-document fpm

      - name: Build
        run: cargo build --release --package evo-cli --bin evoclaw --target x86_64-unknown-linux-gnu

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BIN="target/x86_64-unknown-linux-gnu/release/evoclaw"
          chmod +x "$BIN"

          # .deb
          fpm -s dir -t deb \
            --name evoclaw \
            --version "$VERSION" \
            --architecture amd64 \
            --description "Self-evolving local-first personal AI agent" \
            --url "https://github.com/DevEloLin/evoclaw" \
            --license MIT \
            --prefix /usr/local/bin \
            "$BIN"=evoclaw
          DEB=$(ls evoclaw_*.deb | head -1)
          mv "$DEB" evoclaw-linux-amd64.deb
          sha256sum evoclaw-linux-amd64.deb | awk '{print $1}' > evoclaw-linux-amd64.deb.sha256

          # .rpm
          fpm -s dir -t rpm \
            --name evoclaw \
            --version "$VERSION" \
            --architecture x86_64 \
            --description "Self-evolving local-first personal AI agent" \
            --url "https://github.com/DevEloLin/evoclaw" \
            --license MIT \
            --prefix /usr/local/bin \
            "$BIN"=evoclaw
          RPM=$(ls evoclaw-*.rpm | head -1)
          mv "$RPM" evoclaw-linux-x86_64.rpm
          sha256sum evoclaw-linux-x86_64.rpm | awk '{print $1}' > evoclaw-linux-x86_64.rpm.sha256

          # .tar.gz
          mkdir -p dist
          cp "$BIN" dist/evoclaw
          cp README.md dist/README.md
          tar -czf evoclaw-linux-x86_64.tar.gz -C dist evoclaw README.md
          sha256sum evoclaw-linux-x86_64.tar.gz | awk '{print $1}' > evoclaw-linux-x86_64.tar.gz.sha256

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: evoclaw-linux-amd64.deb
          path: |
            evoclaw-linux-amd64.deb
            evoclaw-linux-amd64.deb.sha256

      - name: Upload rpm
        uses: actions/upload-artifact@v4
        with:
          name: evoclaw-linux-x86_64.rpm
          path: |
            evoclaw-linux-x86_64.rpm
            evoclaw-linux-x86_64.rpm.sha256

      - name: Upload tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: evoclaw-linux-x86_64.tar.gz
          path: |
            evoclaw-linux-x86_64.tar.gz
            evoclaw-linux-x86_64.tar.gz.sha256

# ─────────────────────────────────────────────────────────
# Windows — NSIS installer (.exe)
# ─────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows x64 installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --package evo-cli --bin evoclaw --target x86_64-pc-windows-msvc

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Create NSIS installer
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart('v')
          $BIN = "target\x86_64-pc-windows-msvc\release\evoclaw.exe"

          # Build NSI as array of literal strings (avoids YAML here-string indent clash)
          $nsiLines = @(
            '!define PRODUCT_NAME "EvoClaw"',
            '!define PRODUCT_VERSION "EVOCLAW_VERSION"',
            '!define INSTALL_DIR "$LOCALAPPDATA\Programs\EvoClaw"',
            '!define HWND_BROADCAST 0xffff',
            '!define WM_WININICHANGE 0x001A',
            '',
            'Name "${PRODUCT_NAME} ${PRODUCT_VERSION}"',
            'OutFile "evoclaw-windows-x64-setup.exe"',
            'InstallDir "${INSTALL_DIR}"',
            'RequestExecutionLevel user',
            'SetCompressor lzma',
            '',
            'Section "Install"',
            '  SetOutPath "$INSTDIR"',
            '  File "evoclaw.exe"',
            '  WriteUninstaller "$INSTDIR\uninstall.exe"',
            '',
            '  ; Add to user PATH (HKCU)',
            '  ReadRegStr $0 HKCU "Environment" "PATH"',
            '  StrCpy $0 "$0;$INSTDIR"',
            '  WriteRegExpandStr HKCU "Environment" "PATH" "$0"',
            '  SendMessage ${HWND_BROADCAST} ${WM_WININICHANGE} 0 "STR:Environment" /TIMEOUT=5000',
            'SectionEnd',
            '',
            'Section "Uninstall"',
            '  Delete "$INSTDIR\evoclaw.exe"',
            '  Delete "$INSTDIR\uninstall.exe"',
            '  RMDir "$INSTDIR"',
            'SectionEnd'
          )
          $nsi = ($nsiLines -join "`n").Replace('EVOCLAW_VERSION', $VERSION)
          # Use .NET WriteAllText for reliable ASCII output (avoids PowerShell BOM issues)
          [System.IO.File]::WriteAllText(
            (Join-Path (Get-Location) 'installer.nsi'),
            $nsi,
            [System.Text.Encoding]::ASCII
          )

          Copy-Item $BIN evoclaw.exe
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

          $hash = (Get-FileHash "evoclaw-windows-x64-setup.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash  evoclaw-windows-x64-setup.exe" | Out-File -Encoding ascii "evoclaw-windows-x64-setup.exe.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: evoclaw-windows-x64-setup.exe
          path: |
            evoclaw-windows-x64-setup.exe
            evoclaw-windows-x64-setup.exe.sha256

# ─────────────────────────────────────────────────────────
# GitHub Release
# ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name "*.dmg" -o \
            -name "*.exe" -o \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "*.tar.gz" -o \
            -name "*.sha256" \
          \) -exec cp {} release/ \;

      - name: Detect pre-release
        id: prerelease
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ -(alpha|beta|rc)\. ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare release notes
        shell: bash
        run: |
          if [[ "${{ steps.prerelease.outputs.is_prerelease }}" == "true" ]]; then
            NOTES_FILE=".github/beta-notes/${GITHUB_REF_NAME}.md"
          else
            NOTES_FILE=".github/release-notes/${GITHUB_REF_NAME}.md"
          fi

          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" release_body.md
          else
            cat > release_body.md <<EOF
          # EvoClaw ${GITHUB_REF_NAME}

          EvoClaw is a local-first, CLI-first, self-evolving personal AI assistant built with Rust.

          ## Artifacts

          | Platform | File |
          |----------|------|
          | macOS Apple Silicon | \`evoclaw-macos-arm64.dmg\` |
          | Windows x64 | \`evoclaw-windows-x64-setup.exe\` |
          | Linux x64 | \`evoclaw-linux-amd64.deb\` |
          | Linux x64 | \`evoclaw-linux-x86_64.rpm\` |
          | Linux x64 | \`evoclaw-linux-x86_64.tar.gz\` |

          Each artifact has a matching \`.sha256\` checksum file.

          ## Install via Homebrew (macOS, stable releases only)

          \`\`\`bash
          brew install develolin/tap/evoclaw
          \`\`\`
          EOF
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: release_body.md
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
