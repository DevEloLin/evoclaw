# EvoClaw — Homebrew tap auto-update.
#
# Fires when a GitHub Release transitions to "released" (non-pre-release).
# Beta / rc releases do NOT trigger this workflow.
#
# Prerequisites (one-time setup):
#   1. Create a GitHub Personal Access Token with `repo` scope for
#      DevEloLin/homebrew-tap.
#   2. Add it as a repository secret in DevEloLin/evoclaw:
#      Settings -> Secrets -> Actions -> New -> name: TAP_GITHUB_TOKEN

name: Homebrew tap update

on:
  release:
    types: [released]

permissions:
  contents: read

jobs:
  tap-update:
    name: Update homebrew-tap formula
    runs-on: ubuntu-latest

    steps:
      - name: Checkout evoclaw
        uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "evoclaw-*-apple-darwin.tar.gz"
          path: checksums
          merge-multiple: true
        continue-on-error: true

      - name: Fetch SHA256 from release assets (fallback)
        if: ${{ hashFiles('checksums/*.sha256') == '' }}
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          mkdir -p checksums
          archive="evoclaw-aarch64-apple-darwin.tar.gz"
          gh release download "$TAG" \
            --repo DevEloLin/evoclaw \
            --pattern "${archive}" \
            --dir checksums
          shasum -a 256 "checksums/${archive}" \
            | awk '{print $1}' > "checksums/${archive}.sha256"

      - name: Extract SHA256 values
        id: sha
        run: |
          ARM=$(awk '{print $1}' checksums/evoclaw-aarch64-apple-darwin.tar.gz.sha256)
          echo "arm=$ARM" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: DevEloLin/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Update formula
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          python3 scripts/update_formula.py \
            tap/Formula/evoclaw.rb \
            "$VERSION" \
            "${{ steps.sha.outputs.arm }}"

      - name: Commit and push tap
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/evoclaw.rb
          git diff --cached --quiet && echo "No changes." && exit 0
          git commit -m "chore: bump evoclaw to ${{ github.event.release.tag_name }}"
          git push
