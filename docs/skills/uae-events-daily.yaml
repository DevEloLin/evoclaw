schedule: |

  Save as ~/Library/LaunchAgents/com.evoclaw.uae-events.plist:

  ```xml
  <?xml version="1.0" encoding="UTF-8"?>
  <plist version="1.0">
  <dict>
    <key>Label</key>
    <string>com.evoclaw.uae-events</string>
    <key>ProgramArguments</key>
    <array>
      <string>/bin/sh</string>
      <string>-c</string>
      <string>/usr/local/bin/evoclaw run --skill uae-events-daily --param output_dir=$HOME/uae-events --param lookahead_days=14 --param telegram_push=false --param min_relevance=0.4</string>
    </array>
    <key>StartCalendarInterval</key>
    <dict>
      <key>Hour</key>   <integer>12</integer>
      <key>Minute</key> <integer>0</integer>
    </dict>
    <key>StandardOutPath</key>
    <string>/tmp/evoclaw-uae-events.log</string>
    <key>StandardErrorPath</key>
    <string>/tmp/evoclaw-uae-events.err</string>
    <key>EnvironmentVariables</key>
    <dict>
      <key>TZ</key><string>Asia/Dubai</string>
    </dict>
  </dict>
  </plist>
  ```

  Activate:
    launchctl load ~/Library/LaunchAgents/com.evoclaw.uae-events.plist

  Disable temporarily:
    launchctl unload ~/Library/LaunchAgents/com.evoclaw.uae-events.plist

  Run-on-demand once for testing:
    launchctl start com.evoclaw.uae-events

  Or test interactively before scheduling:
    evoclaw run --skill uae-events-daily \\
      --param output_dir=$HOME/uae-events \\
      --param lookahead_days=14 \\
      --param telegram_push=false \\
      --param min_relevance=0.4

  Filter to specific emirates only:
    evoclaw run --skill uae-events-daily \\
      --param output_dir=$HOME/uae-events \\
      --param lookahead_days=14 \\
      --param emirates="Dubai,Abu Dhabi"
