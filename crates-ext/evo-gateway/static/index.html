<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>EvoClaw — WebChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system, ui-sans-serif, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; color: #222; }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    .hint { color: #666; font-size: 0.85rem; }
    .row { display: flex; gap: 0.5rem; margin: 0.75rem 0; }
    input, textarea, button { font: inherit; padding: 0.5rem 0.75rem; border-radius: 6px; border: 1px solid #ccc; }
    input[type=text] { flex: 1; }
    textarea { width: 100%; box-sizing: border-box; min-height: 5rem; font-family: ui-monospace, monospace; }
    button { background: #2563eb; color: white; border: none; cursor: pointer; }
    button:disabled { background: #999; }
    pre { background: #f6f7f9; padding: 0.75rem; border-radius: 6px; overflow-x: auto; font-size: 0.85rem; }
    .meta { color: #888; font-size: 0.85rem; }
    label { font-size: 0.85rem; color: #444; }
  </style>
</head>
<body>
  <h1>EvoClaw &mdash; WebChat</h1>
  <div class="hint">Local Gateway &middot; POST /chat with <code>Authorization: Bearer &lt;token&gt;</code></div>

  <div class="row">
    <label>Token <input id="tok" type="text" value="dev" style="width: 12rem"></label>
  </div>

  <textarea id="prompt" placeholder="Tell EvoClaw what to do..."></textarea>
  <div class="row"><button id="go">Send</button> <span id="meta" class="meta"></span></div>

  <pre id="out">(no response yet)</pre>

  <script>
    const out = document.getElementById('out');
    const meta = document.getElementById('meta');
    document.getElementById('go').addEventListener('click', async () => {
      const token = document.getElementById('tok').value.trim();
      const input = document.getElementById('prompt').value.trim();
      if (!input) return;
      meta.textContent = 'sending...';
      out.textContent = '';
      try {
        const t0 = performance.now();
        const r = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ input })
        });
        const t1 = performance.now();
        const data = await r.json();
        meta.textContent = r.status + ' / ' + (t1-t0).toFixed(0) + ' ms / ' + (data.turns||0) + ' turns / ' + (data.task_id||'');
        out.textContent = data.final_text || JSON.stringify(data, null, 2);
      } catch (e) {
        meta.textContent = 'error';
        out.textContent = String(e);
      }
    });
  </script>
</body>
</html>
